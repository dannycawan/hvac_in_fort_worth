name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (untuk Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # pakai versi terbaru stabil

      # 4. Cache dependensi
      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            build
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-flutter-

      # 5. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 6. Clean build cache
      - name: Flutter clean
        run: flutter clean

      # 7. Update version (auto increment)
      - name: Update version in build.gradle
        run: |
          FILE="android/app/build.gradle"
          if [ -f "$FILE" ]; then
            sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" $FILE
            sed -i "s/versionName \".*\"/versionName \"1.0.${{ github.run_number }}\"/" $FILE
            echo "✅ Updated versionCode=${{ github.run_number }} versionName=1.0.${{ github.run_number }}"
          else
            echo "⚠️ $FILE not found, skipping version update"
            ls -R .
          fi

      # 8. Build APK
      - name: Build APK
        run: flutter build apk --release

      # 9. Build AAB (Play Store)
      - name: Build AAB
        run: flutter build appbundle --release

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # 11. Upload AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
