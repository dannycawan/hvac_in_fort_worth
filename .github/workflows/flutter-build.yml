name: Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java (untuk Android build)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      # 4. Install dependencies & launcher icons
      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons:main || echo "No launcher icons configured"

      # 5. Verify Flutter version
      - name: Verify Flutter version
        run: flutter --version

      # 6. Decode keystore & buat key.properties
      - name: Decode and secure keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/my-release-key.keystore
          chmod 600 android/app/my-release-key.keystore
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=my-release-key.keystore" >> android/key.properties

      # 7. Auto update versionCode & versionName
      - name: Update version in build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle
          echo "Updated versionCode=${{ github.run_number }} versionName=1.0.${{ github.run_number }}"

      # 8. Build APK release
      - name: Build APK (release)
        run: |
          flutter clean
          flutter build apk --release --verbose | tee flutter_build_apk.log

      # 9. Build AAB release
      - name: Build AAB (release)
        run: |
          flutter build appbundle --release --verbose | tee flutter_build_aab.log

      # 10. Debug list all outputs
      - name: Debug list build outputs
        run: |
          echo "== APK files found =="
          find build/app/outputs -name "*.apk" || echo "No APKs found"
          echo "== AAB files found =="
          find build/app/outputs -name "*.aab" || echo "No AABs found"

      # 11. Upload APK artifact (semua APK)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
          retention-days: 7

      # 12. Upload AAB artifact (semua AAB)
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 7

      # 13. Upload native debug symbols (jika ada)
      - name: Upload native debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lib-symbols-${{ github.run_number }}
          path: build/app/intermediates/merged_native_libs/release/out/lib.symbols
          if-no-files-found: ignore

      # 14. Upload build logs
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            flutter_build_apk.log
            flutter_build_aab.log
          if-no-files-found: ignore
