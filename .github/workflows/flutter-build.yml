name: Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java (untuk Android build)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      # 4. Install dependencies & launcher icons
      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons:main || echo "No launcher icons configured"

      # 5. Verify Flutter version
      - name: Verify Flutter version
        run: flutter --version

      # 6. Decode keystore & buat key.properties
      - name: Decode and secure keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/my-release-key.keystore
          chmod 600 android/app/my-release-key.keystore
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=my-release-key.keystore" >> android/key.properties

      # 7. Build APK release
      - name: Build APK (release)
        run: |
          flutter clean
          flutter build apk --release --verbose | tee flutter_build_apk.log

      # 8. Build AAB release
      - name: Build AAB (release)
        run: |
          flutter build appbundle --release --verbose | tee flutter_build_aab.log

      # 9. List outputs
      - name: List APK output
        run: ls -R build/app/outputs/flutter-apk || echo "APK folder not found"

      - name: List AAB output
        run: ls -R build/app/outputs/bundle/release || echo "AAB folder not found"

      # 10. Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      # 11. Upload AAB artifact
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # 12. Upload native debug symbols (jika ada)
      - name: Upload native debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lib-symbols-${{ github.run_number }}
          path: build/app/intermediates/merged_native_libs/release/out/lib.symbols
          if-no-files-found: ignore

      # 13. Upload build logs
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            flutter_build_apk.log
            flutter_build_aab.log
          if-no-files-found: ignore
