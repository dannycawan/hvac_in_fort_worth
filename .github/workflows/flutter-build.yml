name: Flutter Build APK & AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Flutter APK & AAB
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Decode keystore & buat key.properties
      - name: Decode and secure keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/my-release-key.keystore
          chmod 600 android/app/my-release-key.keystore
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=my-release-key.keystore" >> android/key.properties

      # 6. Update versionCode & versionName otomatis
      - name: Update versionCode & versionName
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" android/app/build.gradle.kts
            sed -i "s/versionName = \".*\"/versionName = \"1.0.${{ github.run_number }}\"/" android/app/build.gradle.kts
            echo "✅ Updated versionCode=${{ github.run_number }} versionName=1.0.${{ github.run_number }}"
          else
            echo "❌ android/app/build.gradle.kts not found!"
            exit 1
          fi

      # 7. Print version info untuk debug
      - name: Show version info
        run: |
          echo "=== Version Info (from build.gradle.kts) ==="
          grep "versionCode" android/app/build.gradle.kts || true
          grep "versionName" android/app/build.gradle.kts || true
          echo "=========================================="

      # 8. Build APK release
      - name: Build APK (release)
        run: |
          flutter clean
          flutter build apk --release

      # 9. Build AAB release
      - name: Build AAB (release)
        run: flutter build appbundle --release

      # 10. Debug list output
      - name: List outputs
        run: ls -R build/app/outputs || echo "⚠️ build outputs not found"

      # 11. Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}.apk
          path: build/app/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 7

      # 12. Upload AAB artifact
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}.aab
          path: build/app/outputs/**/*.aab
          if-no-files-found: error
          retention-days: 7
